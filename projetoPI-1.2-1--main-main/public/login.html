<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PI</title>

    <link rel="stylesheet" href="style.css">  <!-- Note o link completo com o /gsi/client no final -->

<script src="https://accounts.google.com/gsi/client" async defer></script>



</head>


    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">
    <div class="login-container">
        <form id="login-form">
            <h2>Login</h2>
            <p id="error-message" class="error"></p>
            <div class="input-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div id="google-auth-container" style="margin-bottom: 20px; text-align: center;">
                <p style="color: #ccc; font-size: 14px; margin-bottom: 10px;">Ou entre com sua conta:</p>
               <button id="buttonDiv">Clique</button>
            </div>

            <button type="submit" class="btn-primary" id="btn-entrar">Entrar</button>

            <button type="submit" class="btn-primary">Entrar</button>

            <div class="login-links">
                <a href="#">Recuperar senha?</a>
                <a href="./registro.html">Registrar</a>
            </div>
        </form>
    </div>
    <script src="auth.js"></script>

    
</body>

</html>
